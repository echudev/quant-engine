# ===================================================================
#  CONFIGURACIÓN CENTRAL — Liquidity Sweep Engine
# ===================================================================

[global]
timeframe       = "1h"
tf_trend        = "1d"
since_date      = "2023-01-01"
since_date_trend= "2021-01-01"   # historia extra para MA200 diaria
since_date_deriv= "2022-06-01"   # desde cuándo bajar OI y funding rate
exchange_id     = "binance"
init_cash       = 10_000

# ── Símbolos a operar
# ccxt_symbol   : formato para OHLCV (Binance)
# bybit_symbol  : formato para OI (Bybit v5)
# binance_symbol: formato para funding rate (Binance Futures)
[[symbols]]
name           = "BTC"
ccxt_symbol    = "BTC/USDT"
bybit_symbol   = "BTCUSDT"
binance_symbol = "BTCUSDT"
enabled        = true

[[symbols]]
name           = "ETH"
ccxt_symbol    = "ETH/USDT"
bybit_symbol   = "ETHUSDT"
binance_symbol = "ETHUSDT"
enabled        = true

[[symbols]]
name           = "SOL"
ccxt_symbol    = "SOL/USDT"
bybit_symbol   = "SOLUSDT"
binance_symbol = "SOLUSDT"
enabled        = true

[[symbols]]
name           = "BNB"
ccxt_symbol    = "BNB/USDT"
bybit_symbol   = "BNBUSDT"
binance_symbol = "BNBUSDT"
enabled        = false   # no edge found across any strategy

[[symbols]]
name           = "TRX"
ccxt_symbol    = "TRX/USDT"
bybit_symbol   = "TRXUSDT"
binance_symbol = "TRXUSDT"
enabled        = false   # no edge found across any strategy

# ── Parámetros: Liquidity Sweep OI [Perfil A — BTC óptimo]
# Cada símbolo puede tener sus propios parámetros.
# Si no se especifica, usa los defaults de [strategy.liquidity_sweep]
[strategy.liquidity_sweep]
oi_drop_pct  = 4.0      # caída mínima de OI acumulada en ventana (%)
oi_window    = 3        # velas para acumular la caída
funding_min  = 0.00005  # funding rate mínimo previo
confirm_body = 0.2      # cuerpo mínimo vela confirmadora (%)
take_profit  = 6.0      # TP en % del precio de entrada
atr_mult     = 3.0      # SL = atr_mult × ATR(atr_period)
atr_period   = 14
ma_trend_1h  = 50       # MA para filtro de tendencia en 1H
ma_trend_1d  = 50       # MA para filtro de tendencia diaria

# Override por símbolo
# BTC: default params gave only 29 trades (7-10/year) — too few for WF.
# Lower thresholds to target 15-20 trades/year so WF optimizer has signal.
# Quality guard: confirm_body kept at 0.3 to avoid pure noise entries.
[strategy.liquidity_sweep.BTC]
oi_drop_pct  = 2.5
funding_min  = 0.00002
confirm_body = 0.3
atr_mult     = 3.0
take_profit  = 6.0

# ETH: 42 trades → 42.9% WR → tighten to reduce noise
[strategy.liquidity_sweep.ETH]
oi_drop_pct  = 6.0
funding_min  = 0.0001
confirm_body = 0.4
atr_mult     = 2.5
take_profit  = 6.0

# SOL: 70 trades → 57% WR but near-zero return → much tighter
[strategy.liquidity_sweep.SOL]
oi_drop_pct  = 7.0      # SOL OI is very noisy, only take strong drops
funding_min  = 0.0001
confirm_body = 0.5
atr_mult     = 2.0
take_profit  = 5.0

# BNB: 38.5% WR → highest bar, extremely selective
[strategy.liquidity_sweep.BNB]
oi_drop_pct  = 7.0
funding_min  = 0.0001
confirm_body = 0.5
atr_mult     = 2.0
take_profit  = 5.0

# TRX: 38.5% WR → extremely selective; TRX funding barely moves
[strategy.liquidity_sweep.TRX]
oi_drop_pct  = 6.0
funding_min  = 0.00005
confirm_body = 0.5
atr_mult     = 1.5
take_profit  = 4.0

# ── Parámetros: RSI Mean Reversion (v2 — with volume confirmation)
# oversold tightened 35→30: fewer but higher-quality entries
# vol_mult: require panic-selling volume spike on the dip candles
[strategy.rsi_reversion]
rsi_period    = 14
oversold      = 30
exit_level    = 55
ma_trend      = 200
take_profit   = 4.0
atr_mult      = 2.0
atr_period    = 14
vol_mult      = 1.5
vol_ma_period = 20
vol_lookback  = 3

# ── Parámetros: Funding Rate Flush
# funding_pct_rank: funding must be in top X% of its 7-day history
# vol_mult: max volume in flush window >= mult × 24h volume MA
[strategy.funding_flush]
oi_drop_pct        = 3.0
oi_window          = 3
funding_pct_rank   = 65.0
funding_rank_window = 168
confirm_body       = 0.3
vol_mult           = 1.3
vol_ma_period      = 24
take_profit        = 5.0
atr_mult           = 2.5
atr_period         = 14
ma_trend_1h        = 50
ma_trend_1d        = 50

# Per-symbol overrides for Funding Flush
# BTC: default gave only 22 trades (7/year) — too few for WF.
# Lower funding_pct_rank to 50 and oi_drop_pct to 1.5 to target 15-20/year.
# vol_mult lowered to 1.0 (remove volume filter) since BTC already has
# the cleanest OI signal — volume rarely double-spikes on BTC flushes.
[strategy.funding_flush.BTC]
funding_pct_rank = 50.0
oi_drop_pct      = 1.5
vol_mult         = 1.0
take_profit      = 5.0
atr_mult         = 2.5

# SOL: needs higher funding threshold — its funding is noisier
[strategy.funding_flush.SOL]
funding_pct_rank = 70.0
oi_drop_pct      = 4.0
vol_mult         = 1.5
take_profit      = 5.0
atr_mult         = 2.0

# ETH: grid search optimal (320 combos, 2026-03-29)
# funding_pct_rank 55 → more signals at same quality (Sharpe 1.52 vs 1.05 default)
# oi_drop_pct 2.0 → lower bar catches more genuine flushes
# vol_mult 1.5 → keeps volume filter meaningful
[strategy.funding_flush.ETH]
funding_pct_rank = 55.0
oi_drop_pct      = 2.0
vol_mult         = 1.5
take_profit      = 5.0

# BNB: conservative — weak historical edge
[strategy.funding_flush.BNB]
funding_pct_rank = 72.0
oi_drop_pct      = 4.0
vol_mult         = 1.5

# TRX: very conservative — most noise
[strategy.funding_flush.TRX]
funding_pct_rank = 72.0
oi_drop_pct      = 4.0
vol_mult         = 1.8

# ── Grid search
[optimization]
min_trades   = 20
max_drawdown = -30.0    # descartar si DD peor que esto
min_win_rate = 45.0

# ===================================================================
#  EXPERIMENTO: gradiente de capitalización — Liquidity Sweep OI
#  Hipótesis: el edge OOS correlaciona inversamente con el tamaño
#  del par (rank por open interest en USD).
#  Lanzar con: python -m experiments.cap_gradient
# ===================================================================
[experiment.cap_gradient]
top_n              = 20          # universo: top N perpetuos USDT por OI en USD
min_history_months = 18          # historia mínima requerida (OHLCV + OI)
since_date         = "2023-01-01"  # inicio común (símbolos listados después arrancan en su listing)
max_missing_pct    = 2.0         # excluir si faltan más de este % de velas OHLCV
max_oi_missing_pct = 5.0         # excluir si la cobertura de OI es menor a 100-X%
gap_alert_candles  = 6           # registrar gaps mayores a N velas consecutivas

# Costos pesimistas escalonados por rank de OI (round-trip = 2x por entrada+salida)
# tier 1 (ranks 1-5)  = costos base; tier 2 (6-12) = 1.5x; tier 3 (13-20) = 2.5x
base_fees      = 0.001           # taker fee por lado (= default histórico del motor)
base_slippage  = 0.0005          # slippage estimado por lado
tier_max_rank  = [5, 12, 20]
tier_cost_mult = [1.0, 1.5, 2.5]

# Walk-forward — idéntico para todos los símbolos (misma config que BTC/ETH)
train_months      = 12
test_months       = 6
min_trades        = 5            # mínimo de trades in-sample por combo
low_sample_trades = 15           # ventanas OOS con menos trades se marcan low_sample
seed              = 42

# Stablecoins y sintéticos a excluir del universo (baseCoin de Bybit)
exclude_bases = ["USDC", "USDE", "DAI", "TUSD", "FDUSD", "BUSD", "USTC", "USDD", "PYUSD", "USD1", "XUSD"]

# Grilla unificada de WF (unión de las grillas validadas en BTC y ETH)
# 6 × 4 × 3 × 3 = 216 combinaciones por ventana
[experiment.cap_gradient.grid]
oi_drop_pct = [0.5, 1.0, 1.5, 2.5, 4.0, 6.0]
funding_min = [0.0, 0.00002, 0.00005, 0.0001]
take_profit = [4.0, 6.0, 8.0]
atr_mult    = [2.0, 2.5, 3.0]
